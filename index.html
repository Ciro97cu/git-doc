<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Appunti Git</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Appunti di studio su Git, da zero ad avanzato">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Tema in stile Git (git-scm.com). Solo CSS, nessuna dipendenza. */
    :root {
      --theme-color: #f05133;        /* arancione del logo Git */
      --theme-color-dark: #c9382a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
    }
    .markdown-section { max-width: 850px; }

    /* Titoli con riga accento */
    .markdown-section h1,
    .markdown-section h2 {
      border-bottom: 1px solid #eaecef;
      padding-bottom: .3em;
      color: #24292e;
    }

    /* Codice inline arancione, stile git-scm */
    .markdown-section code {
      color: #c9382a;
      background-color: #f6f8fa;
      font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    }
    .markdown-section pre,
    .markdown-section pre > code {
      font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    }

    /* Sidebar */
    .sidebar { border-right: 1px solid #eaecef; }
    .sidebar-nav li.active > a {
      color: var(--theme-color);
      border-right: 3px solid var(--theme-color);
      font-weight: 600;
    }
    .app-name-link { color: var(--theme-color) !important; font-weight: 700; }

    /* Tabelle e ricerca */
    .markdown-section table th { background: #f6f8fa; }
    .search input { border: 1px solid #eaecef; }
  </style>
</head>
<body>
  <div id="app">Caricamento…</div>
  <script>
    window.$docsify = {
      name: 'Appunti Git',
      loadSidebar: true,
      subMaxLevel: 2,
      relativePath: true,
      auto2top: true,
      search: {
        placeholder: 'Cerca…',
        noData: 'Nessun risultato',
        depth: 4
      },
      copyCode: {
        buttonText: 'Copia',
        successText: 'Copiato'
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
